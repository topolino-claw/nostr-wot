<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nfbf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <filter id="nfbf-step" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#a78bfa" flood-opacity="0.65"/>
    </filter>
    <filter id="nfbf-key" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#fde047" flood-opacity="0.65"/>
    </filter>
    <filter id="nfbf-app" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#60a5fa" flood-opacity="0.55"/>
    </filter>
    <filter id="nfbf-relay" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.55"/>
    </filter>
    <filter id="nfbf-post" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f472b6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" viewBox="0 0 800 450" fill="url(#nfbf-bg)"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="rgba(167,139,250,0.5)" text-anchor="middle" letter-spacing="2">YOUR FIRST STEPS ON NOSTR</text>

  <!-- Step nodes: 3 on top row, 3 on bottom row -->
  <!-- ROW 1 -->

  <!-- Step 1 -->
  <g filter="url(#nfbf-step)">
    <circle cx="130" cy="175" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(167,139,250,0.65)" stroke-width="1.8"/>
    <text x="130" y="165" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(167,139,250,0.4)" text-anchor="middle">STEP</text>
    <text x="130" y="186" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="rgba(167,139,250,0.85)" text-anchor="middle">1</text>
  </g>
  <text x="130" y="228" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(167,139,250,0.7)" text-anchor="middle">Understand</text>

  <line x1="170" y1="175" x2="218" y2="175" stroke="rgba(167,139,250,0.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
  <polygon points="215,171 225,175 215,179" fill="rgba(167,139,250,0.4)"/>

  <!-- Step 2 -->
  <g filter="url(#nfbf-key)">
    <circle cx="265" cy="175" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(253,224,71,0.65)" stroke-width="1.8"/>
    <circle cx="255" cy="170" r="8" fill="none" stroke="rgba(253,224,71,0.8)" stroke-width="2"/>
    <line x1="263" y1="170" x2="278" y2="170" stroke="rgba(253,224,71,0.8)" stroke-width="2" stroke-linecap="round"/>
    <line x1="275" y1="170" x2="275" y2="176" stroke="rgba(253,224,71,0.8)" stroke-width="2" stroke-linecap="round"/>
    <line x1="279" y1="170" x2="279" y2="176" stroke="rgba(253,224,71,0.8)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="265" y="228" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(253,224,71,0.7)" text-anchor="middle">Get Your Keys</text>

  <line x1="305" y1="175" x2="353" y2="175" stroke="rgba(167,139,250,0.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
  <polygon points="350,171 360,175 350,179" fill="rgba(167,139,250,0.4)"/>

  <!-- Step 3 -->
  <g filter="url(#nfbf-app)">
    <circle cx="400" cy="175" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(96,165,250,0.65)" stroke-width="1.8"/>
    <rect x="386" y="160" width="16" height="24" rx="3" fill="none" stroke="rgba(96,165,250,0.65)" stroke-width="1.8"/>
    <rect x="388" y="178" width="12" height="2" rx="1" fill="rgba(96,165,250,0.4)"/>
    <rect x="406" y="163" width="18" height="13" rx="2.5" fill="none" stroke="rgba(96,165,250,0.5)" stroke-width="1.5"/>
    <rect x="403" y="176" width="24" height="3" rx="1.5" fill="rgba(96,165,250,0.3)"/>
  </g>
  <text x="400" y="228" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(96,165,250,0.7)" text-anchor="middle">Pick a Client</text>

  <!-- Curve arrow from row 1 to row 2 -->
  <path d="M 440,180 Q 540,180 535,245" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1.2" stroke-dasharray="3,3"/>
  <polygon points="525,243 530,255 535,243" fill="rgba(167,139,250,0.35)"/>

  <!-- ROW 2 -->

  <!-- Step 4 -->
  <g filter="url(#nfbf-relay)">
    <circle cx="530" cy="285" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.65)" stroke-width="1.8"/>
    <rect x="516" y="268" width="28" height="7" rx="1.5" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    <rect x="516" y="278" width="28" height="7" rx="1.5" fill="rgba(74,222,128,0.12)"/>
    <rect x="516" y="288" width="28" height="7" rx="1.5" fill="rgba(74,222,128,0.08)"/>
    <circle cx="521" cy="272" r="1.8" fill="rgba(74,222,128,0.9)"/>
    <circle cx="521" cy="282" r="1.8" fill="rgba(74,222,128,0.7)"/>
    <circle cx="521" cy="292" r="1.8" fill="rgba(74,222,128,0.5)"/>
  </g>
  <text x="530" y="338" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(74,222,128,0.7)" text-anchor="middle">Connect Relays</text>

  <line x1="490" y1="285" x2="438" y2="285" stroke="rgba(167,139,250,0.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
  <polygon points="441,281 431,285 441,289" fill="rgba(167,139,250,0.4)"/>

  <!-- Step 5 -->
  <g filter="url(#nfbf-step)">
    <circle cx="390" cy="285" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(167,139,250,0.65)" stroke-width="1.8"/>
    <circle cx="378" cy="276" r="6" fill="rgba(167,139,250,0.5)"/>
    <path d="M370,285 Q370,280 378,280 Q386,280 386,285" fill="rgba(167,139,250,0.35)"/>
    <circle cx="402" cy="276" r="6" fill="rgba(167,139,250,0.4)"/>
    <path d="M394,285 Q394,280 402,280 Q410,280 410,285" fill="rgba(167,139,250,0.25)"/>
    <circle cx="390" cy="295" r="7" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
    <line x1="387" y1="295" x2="393" y2="295" stroke="rgba(167,139,250,0.7)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="390" y1="292" x2="390" y2="298" stroke="rgba(167,139,250,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="390" y="338" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(167,139,250,0.7)" text-anchor="middle">Follow People</text>

  <line x1="350" y1="285" x2="298" y2="285" stroke="rgba(167,139,250,0.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
  <polygon points="301,281 291,285 301,289" fill="rgba(167,139,250,0.4)"/>

  <!-- Step 6 -->
  <g filter="url(#nfbf-post)">
    <circle cx="250" cy="285" r="40" fill="rgba(20,15,50,0.95)" stroke="rgba(244,114,182,0.65)" stroke-width="1.8"/>
    <rect x="232" y="268" width="36" height="26" rx="6" fill="rgba(244,114,182,0.12)" stroke="rgba(244,114,182,0.55)" stroke-width="1.5"/>
    <path d="M240,294 L236,304 L248,294" fill="rgba(244,114,182,0.12)" stroke="rgba(244,114,182,0.55)" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="238" y1="276" x2="262" y2="276" stroke="rgba(244,114,182,0.45)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="238" y1="282" x2="256" y2="282" stroke="rgba(244,114,182,0.3)" stroke-width="1.2" stroke-linecap="round"/>
    <text x="272" y="306" font-family="'Inter', sans-serif" font-size="11" fill="rgba(244,114,182,0.55)">#</text>
  </g>
  <text x="250" y="338" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(244,114,182,0.7)" text-anchor="middle">Say Hello</text>
  <text x="250" y="352" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(244,114,182,0.4)" text-anchor="middle">#introductions</text>

  <!-- Bottom tagline -->
  <text x="400" y="400" font-family="'Inter', sans-serif" font-size="10" fill="rgba(167,139,250,0.3)" text-anchor="middle">Your identity. Your posts. Your network. No company in between.</text>
  <text x="400" y="425" font-family="'Inter', sans-serif" font-size="9.5" fill="rgba(167,139,250,0.25)" text-anchor="middle">⏱ about 10 minutes</text>
</svg>
