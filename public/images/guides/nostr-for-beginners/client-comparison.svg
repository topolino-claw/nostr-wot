<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <filter id="cc-glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
    <filter id="cc-glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a855f7" flood-opacity="0.5"/>
    </filter>
    <filter id="cc-glow-violet" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
    <filter id="cc-glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.5"/>
    </filter>
  <clipPath id="coracle2-clip">
    <circle cx="115" cy="110" r="40"/>
  </clipPath>
  <clipPath id="damus2-clip">
    <circle cx="305" cy="110" r="40"/>
  </clipPath>
  <clipPath id="amethyst2-clip">
    <circle cx="495" cy="110" r="40"/>
  </clipPath>
  <clipPath id="primal2-clip">
    <circle cx="685" cy="110" r="40"/>
  </clipPath>
  </defs>

  <rect width="800" height="320" fill="url(#cc-bg)"/>
  <text x="400" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="rgba(167,139,250,0.55)" text-anchor="middle" letter-spacing="2">PICK A CLIENT</text>

  <!-- Card: Coracle -->
  <g>
    <rect x="30" y="50" width="170" height="220" rx="12" fill="rgba(20,15,50,0.95)" stroke="rgba(59,130,246,0.45)" stroke-width="1.5"/>
    <image x="75" y="70" width="80" height="80" href="data:image/jpeg;base64," clip-path="url(#coracle2-clip)" preserveAspectRatio="xMidYMid slice"/>
    <text x="115" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="rgba(59,130,246,0.9)" text-anchor="middle">Coracle</text>
    <text x="115" y="180" font-family="'Inter', sans-serif" font-size="10" fill="rgba(59,130,246,0.45)" text-anchor="middle">Web</text>
    <rect x="30" y="50" width="170" height="220" rx="12" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Card: Damus -->
  <g>
    <rect x="220" y="50" width="170" height="220" rx="12" fill="rgba(20,15,50,0.95)" stroke="rgba(168,85,247,0.45)" stroke-width="1.5"/>
    <image x="265" y="70" width="80" height="80" href="data:image/jpeg;base64," clip-path="url(#damus2-clip)" preserveAspectRatio="xMidYMid slice"/>
    <text x="305" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="rgba(168,85,247,0.9)" text-anchor="middle">Damus</text>
    <text x="305" y="180" font-family="'Inter', sans-serif" font-size="10" fill="rgba(168,85,247,0.45)" text-anchor="middle">iOS</text>
    <rect x="220" y="50" width="170" height="220" rx="12" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Card: Amethyst -->
  <g>
    <rect x="410" y="50" width="170" height="220" rx="12" fill="rgba(20,15,50,0.95)" stroke="rgba(139,92,246,0.45)" stroke-width="1.5"/>
    <image x="455" y="70" width="80" height="80" href="data:image/jpeg;base64," clip-path="url(#amethyst2-clip)" preserveAspectRatio="xMidYMid slice"/>
    <text x="495" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="rgba(139,92,246,0.9)" text-anchor="middle">Amethyst</text>
    <text x="495" y="180" font-family="'Inter', sans-serif" font-size="10" fill="rgba(139,92,246,0.45)" text-anchor="middle">Android</text>
    <rect x="410" y="50" width="170" height="220" rx="12" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Card: Primal -->
  <g>
    <rect x="600" y="50" width="170" height="220" rx="12" fill="rgba(20,15,50,0.95)" stroke="rgba(245,158,11,0.45)" stroke-width="1.5"/>
    <image x="645" y="70" width="80" height="80" href="data:image/jpeg;base64," clip-path="url(#primal2-clip)" preserveAspectRatio="xMidYMid slice"/>
    <text x="685" y="160" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="rgba(245,158,11,0.9)" text-anchor="middle">Primal</text>
    <text x="685" y="180" font-family="'Inter', sans-serif" font-size="10" fill="rgba(245,158,11,0.45)" text-anchor="middle">Web · iOS · Android</text>
    <rect x="600" y="50" width="170" height="220" rx="12" fill="none" stroke="rgba(245,158,11,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Footer note -->
  <text x="400" y="305" font-family="'Inter', sans-serif" font-size="10" fill="rgba(167,139,250,0.35)" text-anchor="middle">All clients use the same protocol — your identity and posts work across all of them</text>
</svg>