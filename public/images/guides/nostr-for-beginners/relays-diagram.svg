<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <filter id="rd-client-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#3b82f6" flood-opacity="0.7"/>
    </filter>
    <filter id="rd-relay-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="280" fill="url(#rd-bg)"/>

  <!-- Caption -->
  <text x="400" y="26" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="rgba(167,139,250,0.55)" text-anchor="middle" letter-spacing="2">CONNECT TO RELAYS</text>

  <!-- Client node (center-left) -->
  <g filter="url(#rd-client-glow)">
    <rect x="60" y="100" width="130" height="70" rx="14" fill="rgba(20,15,50,0.95)" stroke="rgba(59,130,246,0.7)" stroke-width="2"/>
    <!-- Phone/laptop icon -->
    <rect x="100" y="115" width="28" height="20" rx="3" fill="none" stroke="rgba(59,130,246,0.7)" stroke-width="1.5"/>
    <rect x="104" y="119" width="20" height="12" rx="1" fill="rgba(59,130,246,0.2)"/>
    <line x1="96" y1="139" x2="132" y2="139" stroke="rgba(59,130,246,0.5)" stroke-width="1.2"/>
    <circle cx="114" cy="148" r="2" fill="rgba(59,130,246,0.4)"/>
  </g>
  <text x="125" y="167" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="rgba(59,130,246,0.85)" text-anchor="middle">YOUR CLIENT</text>

  <!-- Broadcast rings -->
  <circle cx="125" cy="135" r="50" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1" stroke-dasharray="3,6"/>
  <circle cx="125" cy="135" r="70" fill="none" stroke="rgba(59,130,246,0.05)" stroke-width="0.8" stroke-dasharray="3,6"/>

  <!-- Connection lines with varying opacity -->
  <line x1="190" y1="115" x2="470" y2="62" stroke="rgba(74,222,128,0.45)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="340" cy="86" r="3" fill="rgba(74,222,128,0.65)"/>
  <polygon points="466,57 478,62 468,70" fill="rgba(74,222,128,0.55)"/>

  <line x1="190" y1="125" x2="470" y2="112" stroke="rgba(74,222,128,0.5)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="350" cy="117" r="3" fill="rgba(74,222,128,0.7)"/>
  <polygon points="466,108 478,112 468,119" fill="rgba(74,222,128,0.6)"/>

  <line x1="190" y1="140" x2="470" y2="162" stroke="rgba(74,222,128,0.55)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="330" cy="151" r="3" fill="rgba(74,222,128,0.75)"/>
  <polygon points="466,158 478,162 468,169" fill="rgba(74,222,128,0.65)"/>

  <line x1="190" y1="150" x2="470" y2="212" stroke="rgba(74,222,128,0.4)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="345" cy="184" r="3" fill="rgba(74,222,128,0.6)"/>
  <polygon points="466,208 478,212 468,219" fill="rgba(74,222,128,0.5)"/>

  <line x1="190" y1="155" x2="470" y2="252" stroke="rgba(74,222,128,0.35)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="320" cy="200" r="3" fill="rgba(74,222,128,0.5)"/>
  <polygon points="466,248 478,252 468,259" fill="rgba(74,222,128,0.45)"/>

  <!-- Relay 1: relay.damus.io -->
  <g filter="url(#rd-relay-glow)">
    <rect x="480" y="42" width="175" height="40" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.45)" stroke-width="1.2"/>
    <rect x="492" y="52" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.35)" stroke-width="0.6"/>
    <rect x="492" y="60" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.08)"/>
    <circle cx="496" cy="55" r="1.5" fill="rgba(74,222,128,0.75)"/>
    <circle cx="496" cy="63" r="1.5" fill="rgba(74,222,128,0.4)"/>
    <text x="516" y="61" font-family="'Inter', monospace" font-size="10" fill="rgba(74,222,128,0.75)">relay.damus.io</text>
    <circle cx="640" cy="62" r="4" fill="rgba(74,222,128,0.7)"/>
  </g>

  <!-- Relay 2: relay.primal.net -->
  <g filter="url(#rd-relay-glow)">
    <rect x="480" y="92" width="175" height="40" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.45)" stroke-width="1.2"/>
    <rect x="492" y="102" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.35)" stroke-width="0.6"/>
    <rect x="492" y="110" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.08)"/>
    <circle cx="496" cy="105" r="1.5" fill="rgba(74,222,128,0.75)"/>
    <circle cx="496" cy="113" r="1.5" fill="rgba(74,222,128,0.4)"/>
    <text x="516" y="111" font-family="'Inter', monospace" font-size="10" fill="rgba(74,222,128,0.75)">relay.primal.net</text>
    <circle cx="640" cy="112" r="4" fill="rgba(74,222,128,0.7)"/>
  </g>

  <!-- Relay 3: nos.lol -->
  <g filter="url(#rd-relay-glow)">
    <rect x="480" y="142" width="175" height="40" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.45)" stroke-width="1.2"/>
    <rect x="492" y="152" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.35)" stroke-width="0.6"/>
    <rect x="492" y="160" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.08)"/>
    <circle cx="496" cy="155" r="1.5" fill="rgba(74,222,128,0.75)"/>
    <circle cx="496" cy="163" r="1.5" fill="rgba(74,222,128,0.4)"/>
    <text x="516" y="161" font-family="'Inter', monospace" font-size="10" fill="rgba(74,222,128,0.75)">nos.lol</text>
    <circle cx="640" cy="162" r="4" fill="rgba(74,222,128,0.7)"/>
  </g>

  <!-- Relay 4: relay.nostr.band -->
  <g filter="url(#rd-relay-glow)">
    <rect x="480" y="192" width="175" height="40" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.45)" stroke-width="1.2"/>
    <rect x="492" y="202" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.35)" stroke-width="0.6"/>
    <rect x="492" y="210" width="16" height="6" rx="1.5" fill="rgba(74,222,128,0.08)"/>
    <circle cx="496" cy="205" r="1.5" fill="rgba(74,222,128,0.75)"/>
    <circle cx="496" cy="213" r="1.5" fill="rgba(74,222,128,0.4)"/>
    <text x="516" y="211" font-family="'Inter', monospace" font-size="10" fill="rgba(74,222,128,0.75)">relay.nostr.band</text>
    <circle cx="640" cy="212" r="4" fill="rgba(74,222,128,0.7)"/>
  </g>

  <!-- Relay 5: wss://your.relay -->
  <g filter="url(#rd-relay-glow)">
    <rect x="480" y="242" width="175" height="28" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="568" y="260" font-family="'Inter', monospace" font-size="9" fill="rgba(74,222,128,0.4)" text-anchor="middle">+ add more relays</text>
  </g>

  <!-- Bottom label -->
  <text x="340" y="268" font-family="'Inter', sans-serif" font-size="10" fill="rgba(167,139,250,0.35)" text-anchor="middle">Your posts reach all connected relays simultaneously</text>
</svg>
