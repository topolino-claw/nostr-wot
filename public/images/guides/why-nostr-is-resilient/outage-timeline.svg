<svg width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ot-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="ot-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f87171" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="800" height="320" fill="url(#ot-bg)"/>

  <text x="400" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="rgba(248,113,113,0.6)" text-anchor="middle" letter-spacing="2">WHEN A CLOUD PROVIDER FAILS</text>

  <!-- Timeline spine -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="rgba(248,113,113,0.3)" stroke-width="2"/>

  <!-- Event 1: Provider A -->
  <g filter="url(#ot-glow)">
    <circle cx="160" cy="160" r="8" fill="rgba(248,113,113,0.85)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5"/>
    <line x1="160" y1="152" x2="160" y2="90" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <rect x="88" y="55" width="144" height="35" rx="6" fill="rgba(30,10,30,0.9)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="160" y="72" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(248,113,113,0.85)" text-anchor="middle">Cloud Provider A</text>
    <text x="160" y="85" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.5)" text-anchor="middle">Major outage · hours-long</text>
  </g>
  <text x="160" y="185" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.45)" text-anchor="middle">Social media · SaaS</text>
  <text x="160" y="198" font-family="'Inter', sans-serif" font-size="8" fill="rgba(248,113,113,0.3)" text-anchor="middle">streaming · banking</text>

  <!-- Event 2: Provider B -->
  <g filter="url(#ot-glow)">
    <circle cx="310" cy="160" r="8" fill="rgba(248,113,113,0.85)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5"/>
    <line x1="310" y1="168" x2="310" y2="230" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <rect x="238" y="230" width="144" height="35" rx="6" fill="rgba(30,10,30,0.9)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="310" y="247" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(248,113,113,0.85)" text-anchor="middle">CDN / Edge Provider</text>
    <text x="310" y="260" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.5)" text-anchor="middle">Global outage</text>
  </g>
  <text x="310" y="143" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.45)" text-anchor="middle">AI services · Discord</text>
  <text x="310" y="130" font-family="'Inter', sans-serif" font-size="8" fill="rgba(248,113,113,0.3)" text-anchor="middle">transit APIs · e-commerce</text>

  <!-- Event 3: Provider C -->
  <g filter="url(#ot-glow)">
    <circle cx="490" cy="160" r="8" fill="rgba(248,113,113,0.85)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5"/>
    <line x1="490" y1="152" x2="490" y2="90" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <rect x="418" y="55" width="144" height="35" rx="6" fill="rgba(30,10,30,0.9)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="490" y="72" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(248,113,113,0.85)" text-anchor="middle">Cloud Provider B</text>
    <text x="490" y="85" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.5)" text-anchor="middle">Region-wide failure</text>
  </g>
  <text x="490" y="185" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.45)" text-anchor="middle">Enterprise tools · email</text>
  <text x="490" y="198" font-family="'Inter', sans-serif" font-size="8" fill="rgba(248,113,113,0.3)" text-anchor="middle">professional networks</text>

  <!-- Event 4: Repeated -->
  <g filter="url(#ot-glow)">
    <circle cx="650" cy="160" r="8" fill="rgba(248,113,113,0.85)" stroke="rgba(248,113,113,0.4)" stroke-width="1.5"/>
    <line x1="650" y1="168" x2="650" y2="230" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <rect x="578" y="230" width="144" height="35" rx="6" fill="rgba(30,10,30,0.9)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="650" y="247" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="rgba(248,113,113,0.85)" text-anchor="middle">Cloud Provider A</text>
    <text x="650" y="260" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.5)" text-anchor="middle">Again. Different region.</text>
  </g>
  <text x="650" y="143" font-family="'Inter', sans-serif" font-size="8.5" fill="rgba(248,113,113,0.45)" text-anchor="middle">More services down</text>
  <text x="650" y="130" font-family="'Inter', sans-serif" font-size="8" fill="rgba(248,113,113,0.3)" text-anchor="middle">same root cause</text>

  <!-- Start / End markers -->
  <text x="60" y="155" font-family="'Inter', sans-serif" font-size="9" fill="rgba(248,113,113,0.3)" text-anchor="middle">Jan</text>
  <text x="740" y="155" font-family="'Inter', sans-serif" font-size="9" fill="rgba(248,113,113,0.3)" text-anchor="middle">Dec</text>

  <text x="400" y="298" font-family="'Inter', sans-serif" font-size="9.5" fill="rgba(248,113,113,0.3)" text-anchor="middle">All running on the same handful of cloud providers — one failure cascades everywhere</text>
</svg>
