<svg width="1200" height="630" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="winf-glow" cx="50%" cy="44%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    <filter id="winf-user" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
    <filter id="winf-key" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#fde047" flood-opacity="0.65"/>
    </filter>
    <filter id="winf-note" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.45"/>
    </filter>
    <filter id="winf-relay" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="winf-app" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60a5fa" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" viewBox="0 0 800 450" fill="url(#winf-bg)"/>
  <rect width="1200" height="630" viewBox="0 0 800 450" fill="url(#winf-glow)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="800" y2="450"/>
    <line x1="800" y1="0" x2="0" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
  </g>

  <!-- Tagline -->
  <text x="400" y="34" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="rgba(167,139,250,0.5)" text-anchor="middle" letter-spacing="2">YOUR KEYS. YOUR NOTES. YOUR RELAYS.</text>

  <!-- ── YOU ── -->
  <g filter="url(#winf-user)">
    <circle cx="110" cy="185" r="28" fill="rgba(25,20,60,0.95)" stroke="rgba(167,139,250,0.75)" stroke-width="2"/>
    <circle cx="110" cy="175" r="9" fill="rgba(167,139,250,0.65)"/>
    <path d="M92,195 Q92,186 110,186 Q128,186 128,195" fill="rgba(167,139,250,0.45)"/>
  </g>
  <text x="110" y="228" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="rgba(167,139,250,0.75)" text-anchor="middle">You</text>

  <!-- Public key badge -->
  <g filter="url(#winf-key)">
    <rect x="44" y="245" width="132" height="42" rx="7" fill="rgba(20,15,50,0.95)" stroke="rgba(253,224,71,0.55)" stroke-width="1.2"/>
    <circle cx="64" cy="261" r="5.5" fill="none" stroke="rgba(253,224,71,0.75)" stroke-width="1.2"/>
    <line x1="69" y1="261" x2="82" y2="261" stroke="rgba(253,224,71,0.75)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="79" y1="261" x2="79" y2="265" stroke="rgba(253,224,71,0.75)" stroke-width="1.2"/>
    <text x="88" y="258" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(253,224,71,0.7)">Public Key</text>
    <text x="64" y="278" font-family="'Inter', monospace" font-size="7.5" fill="rgba(253,224,71,0.4)" text-anchor="start">npub1abc…</text>
  </g>

  <!-- Private key badge -->
  <rect x="44" y="293" width="132" height="36" rx="7" fill="rgba(20,15,50,0.95)" stroke="rgba(248,113,113,0.4)" stroke-width="1.2"/>
  <rect x="58" y="305" width="10" height="9" rx="1.5" fill="none" stroke="rgba(248,113,113,0.65)" stroke-width="1.2"/>
  <path d="M59,305 Q59,300 63,300 Q67,300 67,305" fill="none" stroke="rgba(248,113,113,0.65)" stroke-width="1.2"/>
  <circle cx="63" cy="309.5" r="1.5" fill="rgba(248,113,113,0.65)"/>
  <text x="78" y="312" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(248,113,113,0.6)">Private Key</text>
  <text x="78" y="323" font-family="'Inter', sans-serif" font-size="7.5" fill="rgba(248,113,113,0.35)">never share</text>

  <!-- Arrow You → Note -->
  <line x1="140" y1="185" x2="248" y2="185" stroke="rgba(167,139,250,0.35)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="246,181 256,185 246,189" fill="rgba(167,139,250,0.55)"/>

  <!-- ── NOTE ── -->
  <g filter="url(#winf-note)">
    <rect x="260" y="152" width="148" height="80" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
    <line x1="278" y1="170" x2="390" y2="170" stroke="rgba(167,139,250,0.32)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="278" y1="182" x2="374" y2="182" stroke="rgba(167,139,250,0.22)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="278" y1="194" x2="384" y2="194" stroke="rgba(167,139,250,0.18)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- signed badge -->
    <rect x="278" y="207" width="58" height="16" rx="8" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.45)" stroke-width="0.8"/>
    <circle cx="289" cy="215" r="2.5" fill="rgba(74,222,128,0.7)"/>
    <text x="315" y="219" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="rgba(74,222,128,0.7)" text-anchor="middle">✓ signed</text>
  </g>
  <text x="334" y="142" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(167,139,250,0.4)" text-anchor="middle" letter-spacing="1">YOUR NOTE</text>

  <!-- Arrows Note → Relays -->
  <line x1="408" y1="172" x2="500" y2="138" stroke="rgba(74,222,128,0.28)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="497,133 508,136 501,145" fill="rgba(74,222,128,0.45)"/>
  <line x1="408" y1="192" x2="500" y2="192" stroke="rgba(74,222,128,0.32)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="497,188 508,192 497,196" fill="rgba(74,222,128,0.5)"/>
  <line x1="408" y1="210" x2="500" y2="246" stroke="rgba(74,222,128,0.28)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="497,242 508,246 501,255" fill="rgba(74,222,128,0.45)"/>

  <!-- ── RELAYS ── -->
  <text x="640" y="80" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(74,222,128,0.45)" text-anchor="middle" letter-spacing="1.5">RELAYS</text>

  <!-- Relay A -->
  <g filter="url(#winf-relay)">
    <rect x="510" y="94" width="200" height="50" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.5)" stroke-width="1.3"/>
    <rect x="525" y="106" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="525" y="115" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.12)"/>
    <circle cx="530" cy="109" r="1.5" fill="rgba(74,222,128,0.8)"/>
    <text x="555" y="113" font-family="'Inter', monospace" font-size="9" fill="rgba(74,222,128,0.7)">relay.damus.io</text>
    <text x="555" y="126" font-family="'Inter', sans-serif" font-size="7.5" fill="rgba(74,222,128,0.35)">Frankfurt</text>
    <circle cx="694" cy="119" r="4" fill="rgba(74,222,128,0.75)"/>
  </g>

  <!-- Relay B -->
  <g filter="url(#winf-relay)">
    <rect x="510" y="162" width="200" height="50" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.5)" stroke-width="1.3"/>
    <rect x="525" y="174" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="525" y="183" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.12)"/>
    <circle cx="530" cy="177" r="1.5" fill="rgba(74,222,128,0.8)"/>
    <text x="555" y="181" font-family="'Inter', monospace" font-size="9" fill="rgba(74,222,128,0.7)">nos.lol</text>
    <text x="555" y="194" font-family="'Inter', sans-serif" font-size="7.5" fill="rgba(74,222,128,0.35)">New York</text>
    <circle cx="694" cy="187" r="4" fill="rgba(74,222,128,0.75)"/>
  </g>

  <!-- Relay C -->
  <g filter="url(#winf-relay)">
    <rect x="510" y="230" width="200" height="50" rx="8" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.5)" stroke-width="1.3"/>
    <rect x="525" y="242" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="525" y="251" width="20" height="6" rx="1.5" fill="rgba(74,222,128,0.12)"/>
    <circle cx="530" cy="245" r="1.5" fill="rgba(74,222,128,0.8)"/>
    <text x="555" y="249" font-family="'Inter', monospace" font-size="9" fill="rgba(74,222,128,0.7)">relay.primal.net</text>
    <text x="555" y="262" font-family="'Inter', sans-serif" font-size="7.5" fill="rgba(74,222,128,0.35)">Toronto</text>
    <circle cx="694" cy="255" r="4" fill="rgba(74,222,128,0.75)"/>
  </g>

  <!-- ── CLIENT APPS (bottom) ── -->
  <text x="400" y="315" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="rgba(96,165,250,0.45)" text-anchor="middle" letter-spacing="1.5">ANY APP CAN READ IT</text>

  <!-- Arrow relays → apps -->
  <line x1="610" y1="282" x2="400" y2="330" stroke="rgba(96,165,250,0.18)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="610" y1="282" x2="610" y2="330" stroke="rgba(96,165,250,0.18)" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- App: Damus -->
  <g filter="url(#winf-app)">
    <rect x="195" y="332" width="56" height="70" rx="7" fill="rgba(20,15,50,0.9)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
    <rect x="202" y="338" width="42" height="48" rx="3" fill="rgba(96,165,250,0.06)"/>
    <rect x="207" y="345" width="32" height="4" rx="2" fill="rgba(167,139,250,0.25)"/>
    <rect x="207" y="352" width="26" height="4" rx="2" fill="rgba(167,139,250,0.18)"/>
    <rect x="207" y="359" width="30" height="4" rx="2" fill="rgba(167,139,250,0.12)"/>
    <circle cx="223" cy="394" r="3" fill="none" stroke="rgba(96,165,250,0.35)" stroke-width="0.8"/>
    <text x="223" y="412" font-family="'Inter', sans-serif" font-size="8" fill="rgba(96,165,250,0.45)" text-anchor="middle">Damus</text>
  </g>

  <!-- App: Primal (laptop) -->
  <g filter="url(#winf-app)">
    <rect x="268" y="340" width="80" height="52" rx="5" fill="rgba(20,15,50,0.9)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
    <rect x="274" y="345" width="68" height="40" rx="3" fill="rgba(96,165,250,0.06)"/>
    <rect x="280" y="351" width="52" height="4" rx="2" fill="rgba(167,139,250,0.25)"/>
    <rect x="280" y="358" width="42" height="4" rx="2" fill="rgba(167,139,250,0.18)"/>
    <rect x="280" y="365" width="48" height="4" rx="2" fill="rgba(167,139,250,0.12)"/>
    <rect x="256" y="392" width="104" height="5" rx="2" fill="rgba(96,165,250,0.2)"/>
    <text x="308" y="412" font-family="'Inter', sans-serif" font-size="8" fill="rgba(96,165,250,0.45)" text-anchor="middle">Primal</text>
  </g>

  <!-- App: Amethyst -->
  <g filter="url(#winf-app)">
    <rect x="362" y="332" width="56" height="70" rx="7" fill="rgba(20,15,50,0.9)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
    <rect x="369" y="338" width="42" height="48" rx="3" fill="rgba(96,165,250,0.06)"/>
    <rect x="374" y="345" width="32" height="4" rx="2" fill="rgba(167,139,250,0.25)"/>
    <rect x="374" y="352" width="26" height="4" rx="2" fill="rgba(167,139,250,0.18)"/>
    <rect x="374" y="359" width="30" height="4" rx="2" fill="rgba(167,139,250,0.12)"/>
    <circle cx="390" cy="394" r="3" fill="none" stroke="rgba(96,165,250,0.35)" stroke-width="0.8"/>
    <text x="390" y="412" font-family="'Inter', sans-serif" font-size="8" fill="rgba(96,165,250,0.45)" text-anchor="middle">Amethyst</text>
  </g>

  <!-- App: Coracle -->
  <g filter="url(#winf-app)">
    <rect x="432" y="340" width="80" height="52" rx="5" fill="rgba(20,15,50,0.9)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
    <rect x="438" y="345" width="68" height="40" rx="3" fill="rgba(96,165,250,0.06)"/>
    <rect x="444" y="351" width="52" height="4" rx="2" fill="rgba(167,139,250,0.25)"/>
    <rect x="444" y="358" width="42" height="4" rx="2" fill="rgba(167,139,250,0.18)"/>
    <rect x="444" y="365" width="48" height="4" rx="2" fill="rgba(167,139,250,0.12)"/>
    <rect x="420" y="392" width="104" height="5" rx="2" fill="rgba(96,165,250,0.2)"/>
    <text x="472" y="412" font-family="'Inter', sans-serif" font-size="8" fill="rgba(96,165,250,0.45)" text-anchor="middle">Coracle</text>
  </g>

  <!-- Switch freely hint -->
  <text x="335" y="432" font-family="'Inter', sans-serif" font-size="8" fill="rgba(96,165,250,0.3)" text-anchor="middle" letter-spacing="0.5">switch apps anytime — your data comes with you</text>

</svg>
