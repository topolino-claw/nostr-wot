<svg width="800" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rn-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <filter id="rn-relay" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.5"/>
    </filter>
    <filter id="rn-user" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="800" height="380" fill="url(#rn-bg)"/>

  <text x="400" y="30" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="rgba(167,139,250,0.5)" text-anchor="middle" letter-spacing="2">YOU PICK YOUR RELAYS — SWITCH ANYTIME</text>

  <!-- User at center -->
  <g filter="url(#rn-user)">
    <circle cx="400" cy="195" r="34" fill="rgba(25,20,60,0.95)" stroke="rgba(167,139,250,0.75)" stroke-width="2.5"/>
    <circle cx="400" cy="183" r="11" fill="rgba(167,139,250,0.65)"/>
    <path d="M381,203 Q381,194 400,194 Q419,194 419,203" fill="rgba(167,139,250,0.45)"/>
  </g>
  <text x="400" y="245" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="rgba(167,139,250,0.75)" text-anchor="middle">You</text>

  <!-- 6 relay nodes around the user -->
  <!-- Top -->
  <g filter="url(#rn-relay)">
    <circle cx="400" cy="80" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="386" y="68" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="386" y="79" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="392" cy="72" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="400" y1="161" x2="400" y2="110" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="400" y="42" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">relay.damus.io</text>

  <!-- Top-right -->
  <g filter="url(#rn-relay)">
    <circle cx="580" cy="115" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="566" y="103" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="566" y="114" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="572" cy="107" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="426" y1="168" x2="555" y2="130" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="580" y="77" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">nos.lol</text>

  <!-- Bottom-right -->
  <g filter="url(#rn-relay)">
    <circle cx="590" cy="270" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="576" y="258" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="576" y="269" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="582" cy="262" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="430" y1="218" x2="564" y2="254" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="590" y="314" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">relay.primal.net</text>

  <!-- Bottom -->
  <g filter="url(#rn-relay)">
    <circle cx="400" cy="310" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="386" y="298" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="386" y="309" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="392" cy="302" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="400" y1="229" x2="400" y2="280" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="400" y="356" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">nostr.wine</text>

  <!-- Bottom-left -->
  <g filter="url(#rn-relay)">
    <circle cx="210" cy="270" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="196" y="258" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="196" y="269" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="202" cy="262" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="370" y1="218" x2="236" y2="254" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="210" y="314" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">nostr.fmt.wiz.biz</text>

  <!-- Top-left -->
  <g filter="url(#rn-relay)">
    <circle cx="220" cy="115" r="30" fill="rgba(20,15,50,0.95)" stroke="rgba(74,222,128,0.6)" stroke-width="1.8"/>
    <rect x="206" y="103" width="28" height="8" rx="2" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.35)" stroke-width="0.8"/>
    <rect x="206" y="114" width="28" height="8" rx="2" fill="rgba(74,222,128,0.1)"/>
    <circle cx="212" cy="107" r="2" fill="rgba(74,222,128,0.85)"/>
  </g>
  <line x1="374" y1="168" x2="245" y2="130" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <text x="220" y="77" font-family="'Inter', monospace" font-size="8.5" fill="rgba(74,222,128,0.5)" text-anchor="middle">purplepag.es</text>

  <!-- Cross-relay mesh (light) -->
  <g stroke="rgba(74,222,128,0.1)" stroke-width="0.8" stroke-dasharray="2,5">
    <line x1="400" y1="110" x2="550" y2="130"/>
    <line x1="550" y1="130" x2="560" y2="240"/>
    <line x1="560" y1="240" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="240" y2="240"/>
    <line x1="240" y1="240" x2="250" y2="130"/>
    <line x1="250" y1="130" x2="400" y2="110"/>
  </g>

  <text x="400" y="375" font-family="'Inter', sans-serif" font-size="10" fill="rgba(74,222,128,0.3)" text-anchor="middle">If one relay goes down, your posts are still on the others</text>
</svg>
